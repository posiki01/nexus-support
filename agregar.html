<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Support - Agregar Servicio</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <div class="container header-content">
        <div class="logo">
            <a href="index.html"> Nexus Support</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="favoritos.html">Favoritos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <div class="container">
        <div class="form-container">
            <h2>Agregar nuevos servicios</h2>
            <form id="form-agregar">
                <div class="form-group">
                    <label for="nombre-servicio">Nombre del servicio</label>
                    <input type="text" id="nombre-servicio" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" required>
                        <option value="Soporte">Soporte</option>
                        <option value="Desarrollo">Desarrollo</option>
                        <option value="Seguridad">Seguridad</option>
                        <option value="Innovación">Innovación</option>
                        <option value="Infraestructura">Infraestructura</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="url-imagen">URL imagen</label>
                    <input type="url" id="url-imagen" placeholder="https://ejemplo.com/imagen.jpg">
                </div>

                <div class="form-group">
                    <label for="precio">Precio</label>
                    <input type="number" id="precio" required>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn-guardar">Guardar</button>
                <div id="mensaje-crud" class="mensaje-confirmacion"></div>
            </form>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="footer-links">
            <a href="index.html">Inicio</a>
            <a href="servicios.html">Servicios</a>
            <a href="favoritos.html">Favoritos</a>
            <a href="contacto.html">Contacto</a>
        </div>
        <div class="footer-copyright">
            <p>&copy; 2026 Nexus Support. Todos los derechos reservados.</p>
        </div>
    </div>
</footer>

<script src="js/data.js"></script>
<script src="js/crud.js"></script>
</body>
</html>
