<section class="container">
  <h1 class="section-title">Contáctanos</h1>
  <div class="contacto-container">
    <div class="contacto-formulario">
      <h2>Envíanos un mensaje</h2>
      <form (ngSubmit)="enviarFormulario()">
        <div class="form-group">
          <label for="nombre">Nombre Completo</label>
          <input type="text" id="nombre" name="nombre" [(ngModel)]="contacto.nombre" required>
        </div>
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" [(ngModel)]="contacto.email" required>
        </div>
        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="5" [(ngModel)]="contacto.mensaje" required></textarea>
        </div>
        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
      </form>
      
      <div *ngIf="confirmacion.visible" 
           [class]="'mensaje-confirmacion ' + (confirmacion.exito ? 'exito' : 'error')">
        {{ confirmacion.mensaje }}
      </div>
    </div>

    <div class="contacto-info">
      <h3>Información de Contacto</h3>
      <div class="info-item">
        <p><strong>📍 Ubicación:</strong> Calle Tecnológica 123, Hub Digital</p>
      </div>
      <div class="info-item">
        <p><strong>📧 Email:</strong> contacto@nexussupport.com</p>
      </div>
      <div class="info-item">
        <p><strong>📞 Teléfono:</strong> +1 234 567 890</p>
      </div>
    </div>
  </div>
</section>
